site_name: Infrastructure Lab Docs
site_description: from bare metal to cloud.

theme:
  name: material
  palette:
    scheme: slate
    primary: deep purple
    accent: teal
  features:
    - navigation.sections
    - navigation.expand
    - content.code.copy

nav:
  - Home: index.md
  - "Phase 1: Local":
      - Admin Box: phase1/admin-box.md
      - ADR-001 Hardening Script: phase1/adr-001-hardening-script.md
  - "Phase 2: Cloud":
      - Network Architecture: phase2/network.md
      - ClickOps Deployment: phase2/aws-clickops-deployment.md
  - "Phase 3: Containerization":
      - CI/CD Pipeline: phase3/containerization.md
      - ADR-004 Workload Architecture: phase3/adr-004-workload-architecture.md
  - "Phase 4: Infrastructure as Code (IaC)":
      - Infrastructure as Code: phase4/infrastructure-as-code.md
      - ADR-005 Managed Database: phase4/adr-005-managed-database.md
  - "Phase 5: Orchestration":
      - ADR-006 Lightweight Kubernetes (K3s) on Proxmox VM: phase5/adr-006-k3s.md
      - K3s Architecture on Proxmox VM: phase5/k3s-architecture.md
      - ADR-007 Infrastructure as Code for Proxmox: phase5/adr-007-proxmox-iac.md
      - Kubernetes: phase5/kubernetes.md
  - "Phase 6: Persistence":
      - ADR-008 Local NVMe Persistence: phase6/adr-008-persistence.md
      - Redis & Disaster Recovery: phase6/redis-dr.md
  - "Phase 7: Ingress":
      - ADR-009 Ingress and Automated TLS: phase7/adr-009-ingress-tls.md
      - Kubernetes Port-Forwarding: phase7/port-forwarding.md
      - ADR-010 DNS-01 and Cloudflare: phase7/adr-010-dns01.md
  - "Phase 8: Package Management":
      - ADR-011 Helm Packaging: phase8/adr-011-helm-packaging.md
      - ADR-012 Redis Helm Chart: phase8/adr-012-redis-helm.md
  - "Phase 9: GitOps":
      - ADR-013 GitOps with ArgoCD: phase9/adr-013-gitops-argocd.md

markdown_extensions:
  - admonition
  - pymdownx.highlight
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.details
