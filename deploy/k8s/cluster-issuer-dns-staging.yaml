apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-production
spec:
  acme:
  # Use the staging server for testing to avoid hitting rate limits
    server: https://acme-staging-v02.api.letsencrypt.org/directory
    privateKeySecretRef:
      name: letsencrypt-production-account-key
    solvers:
      - selector:
          dnsZones:
            - northlift.net
        dns01:
          cnameStrategy: Follow
          cloudflare:
            apiTokenSecretRef:
              # Secret must exist in cert-manager namespace.
              name: cloudflare-api-token-secret
              key: api-token
