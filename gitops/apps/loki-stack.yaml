apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: loki-stack
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "3"
spec:
  project: default
  ignoreDifferences:
    - group: apps
      kind: StatefulSet
      name: loki
      namespace: monitoring
      jsonPointers:
        - /spec/template/spec/containers/0/env
        - /spec/template/spec/containers/0/volumeMounts/2/subPath
  sources:
    - repoURL: https://grafana.github.io/helm-charts
      chart: loki-stack
      targetRevision: 2.10.2
      helm:
        releaseName: loki
        values: |
          loki:
            enabled: true
            isDefault: false
            persistence:
              enabled: true
              storageClassName: local-path
              size: 5Gi
            resources:
              requests:
                memory: 64Mi
                cpu: 50m
              limits:
                memory: 512Mi
                cpu: 150m
            config:
              table_manager:
                retention_deletes_enabled: true
                retention_period: 72h

          promtail:
            enabled: true
            resources:
              requests:
                memory: 16Mi
                cpu: 10m
              limits:
                memory: 128Mi
                cpu: 30m

          grafana:
            enabled: false

          prometheus:
            enabled: false

          fluent-bit:
            enabled: false
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    retry:
      limit: 5
      backoff:
        duration: 10s
        factor: 2
        maxDuration: 3m
    syncOptions:
      - CreateNamespace=true
