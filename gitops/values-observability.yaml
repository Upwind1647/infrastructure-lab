prometheus:
  prometheusSpec:
    retention: 3d
    scrapeInterval: 60s
    resources:
      requests:
        memory: 192Mi
        cpu: 100m
      limits:
        memory: 256Mi
        cpu: 300m

grafana:
  resources:
    requests:
      memory: 64Mi
      cpu: 50m
    limits:
      memory: 128Mi
      cpu: 150m
  additionalDataSources:
    - name: Loki
      type: loki
      url: http://loki:3100

alertmanager:
  alertmanagerSpec:
    resources:
      requests:
        memory: 32Mi
        cpu: 20m
      limits:
        memory: 64Mi
        cpu: 50m

kube-state-metrics:
  resources:
    requests:
      memory: 32Mi
      cpu: 20m
    limits:
      memory: 64Mi
      cpu: 50m

prometheus-node-exporter:
  resources:
    requests:
      memory: 16Mi
      cpu: 10m
    limits:
      memory: 32Mi
      cpu: 30m
