loki:
  enabled: true
  isDefault: false
  persistence:
    enabled: true
    storageClassName: local-path
    size: 5Gi
  resources:
    requests:
      memory: 64Mi
      cpu: 50m
    limits:
      memory: 512Mi
      cpu: 150m
  config:
    table_manager:
      retention_deletes_enabled: true
      retention_period: 72h

promtail:
  enabled: true
  resources:
    requests:
      memory: 16Mi
      cpu: 10m
    limits:
      memory: 32Mi
      cpu: 30m

grafana:
  enabled: false

prometheus:
  enabled: false

fluent-bit:
  enabled: false
