# Overrides for Production AWS
replicaCount: 3

image:
  # Managed by CI workflow after successful GHCR push.
  tag: "bootstrap"

ingress:
  host: "api.upwind.systems"
  tlsSecretName: "status-api-tls-prod"

resources:
  requests:
    cpu: "100m"
    memory: "128Mi"
  limits:
    cpu: "250m"
    memory: "256Mi"

env:
  appEnv: "production"
