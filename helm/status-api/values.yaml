# Homelab Defaults (Proxmox K3s)
replicaCount: 2
revisionHistoryLimit: 3
progressDeadlineSeconds: 600
terminationGracePeriodSeconds: 30

strategy:
  type: RollingUpdate
  rollingUpdate:
    maxUnavailable: 1
    maxSurge: 1

image:
  repository: ghcr.io/upwind1647/status-api
  tag: ""
  pullPolicy: IfNotPresent

env:
  appEnv: "cluster"
  redisHost: "redis-service"

service:
  port: 80
  targetPort: 8000

ingress:
  enabled: true
  className: "traefik"
  host: "lab.northlift.net"
  tlsSecretName: "status-api-tls-prod"
  clusterIssuer: "letsencrypt-production"

resources:
  requests:
    cpu: "100m"
    memory: "64Mi"
  limits:
    cpu: "250m"
    memory: "128Mi"

# Security Basics
automountServiceAccountToken: false
securityContext:
  runAsNonRoot: true
  runAsUser: 1000
  readOnlyRootFilesystem: true
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL
  seccompProfile:
    type: RuntimeDefault

# Probes (Health Checks)
livenessProbe:
  httpGet:
    path: /health
    port: "http"
  initialDelaySeconds: 10
  periodSeconds: 10
  timeoutSeconds: 2
  failureThreshold: 6

readinessProbe:
  httpGet:
    path: /health
    port: "http"
  initialDelaySeconds: 5
  periodSeconds: 5
  timeoutSeconds: 2
  failureThreshold: 6
