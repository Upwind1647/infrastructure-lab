name: Build & Smoke Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  IMAGE_NAME: ghcr.io/upwind1647/status-api

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    permissions:
      contents: read         # necessary for checkout
      packages: write        # necessary to push Docker image

    steps:
      # Get repository code
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      # Install dependencies from lockfile
      - name: Install Dependencies
        run: uv sync --frozen

      # Run test suite
      - name: Run Tests
        env:
          APP_ENV: ci
        run: uv run pytest tests/

      # Enforce code style checks
      - name: Run Black (Code Style)
        run: uv run black --check --diff .

      # Build Docker image and tag with SHA
      - name: Build Docker Image
        run: |
          SHORT_SHA=$(git rev-parse --short HEAD)
          IMAGE_TAG="${IMAGE_NAME}:${SHORT_SHA}"
          echo "IMAGE_TAG=${IMAGE_TAG}" >> "$GITHUB_ENV"
          docker build -t "${IMAGE_TAG}" .

      # Scan the image for vulnerabilities
      - name: Run Trivy Vulnerability Scanner
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          image-ref: ${{ env.IMAGE_TAG }}
          format: 'table'
          exit-code: '1'
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'

      # Launch container, check /health endpoint
      - name: Smoke Test
        run: |
          docker run -d --name test-api -p 8000:8000 \
            -e APP_ENV=ci \
            "${IMAGE_TAG}"

          # Wait up to 20s for healthy response
          for i in $(seq 1 20); do
            if curl -sf http://localhost:8000/health > /dev/null 2>&1; then
              echo "Health check passed (attempt ${i}/20)"
              break
            fi
            echo "Attempt ${i}/20 - waiting..."
            sleep 1
          done

          if ! curl -sf http://localhost:8000/health > /dev/null 2>&1; then
            echo "Health check failed"
            docker logs test-api || true
            exit 1
          fi

      # Remove test container
      - name: Cleanup Test Container
        if: always()
        run: docker rm -f test-api 2>/dev/null || true

      - name: Login to GHCR
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push Image
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: docker push "${IMAGE_TAG}"
