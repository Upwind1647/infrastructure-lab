name: EKS IaC Plan

on:
  pull_request:
    branches: [main]
    paths:
      - terraform/aws/**
      - .github/workflows/eks-plan.yml
  push:
    branches: [main]
    paths:
      - terraform/aws/**
      - .github/workflows/eks-plan.yml
  workflow_dispatch:

concurrency:
  group: eks-plan-${{ github.ref }}
  cancel-in-progress: true

env:
  TF_ROOT: terraform/aws
  TF_IN_AUTOMATION: "true"
  TF_INPUT: "false"

jobs:
  plan:
    name: Plan
    runs-on: ubuntu-latest
    timeout-minutes: 30

    permissions:
      contents: read
      pull-requests: write
      id-token: write

    env:
      TF_VAR_ssh_public_key: ${{ vars.AWS_SSH_PUBLIC_KEY }}
      TF_VAR_home_ip: ${{ vars.AWS_HOME_IP_CIDR }}
      TF_VAR_db_password: ${{ secrets.AWS_DB_PASSWORD }}
      TF_VAR_budget_alert_email: ${{ vars.AWS_BUDGET_ALERT_EMAIL }}
      TF_VAR_enable_cost_budget: "true"
      TF_VAR_enable_eks: "true"
      TF_BACKEND_BUCKET: ${{ vars.TOFU_STATE_BUCKET }}
      TF_BACKEND_LOCK_TABLE: ${{ vars.TOFU_STATE_LOCK_TABLE }}
      TF_BACKEND_REGION: ${{ vars.TOFU_STATE_REGION }}
      TF_BACKEND_KEY: aws/terraform.tfstate

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set Up OpenTofu
        uses: opentofu/setup-opentofu@v1

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ env.TF_BACKEND_REGION }}

      - name: OpenTofu Init
        run: |
          tofu -chdir="${TF_ROOT}" init \
            -backend-config="bucket=${TF_BACKEND_BUCKET}" \
            -backend-config="key=${TF_BACKEND_KEY}" \
            -backend-config="region=${TF_BACKEND_REGION}" \
            -backend-config="dynamodb_table=${TF_BACKEND_LOCK_TABLE}" \
            -backend-config="encrypt=true"

      - name: OpenTofu Fmt
        run: tofu -chdir="${TF_ROOT}" fmt -check

      - name: OpenTofu Validate
        run: tofu -chdir="${TF_ROOT}" validate

      - name: OpenTofu Plan
        run: |
          tofu -chdir="${TF_ROOT}" plan -no-color -out=tfplan
          tofu -chdir="${TF_ROOT}" show -no-color tfplan > "${TF_ROOT}/plan.txt"

      - name: Upload Plan Artifact
        uses: actions/upload-artifact@v4
        with:
          name: aws-eks-plan
          path: terraform/aws/plan.txt

      - name: Comment Plan on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const marker = '<!-- eks-iac-plan -->';
            const planPath = `${process.env.TF_ROOT}/plan.txt`;
            const fullPlan = fs.readFileSync(planPath, 'utf8');
            const clippedPlan = fullPlan.length > 60000 ? `${fullPlan.slice(0, 60000)}\n\n...truncated...` : fullPlan;
            const body = [
              marker,
              '### EKS IaC OpenTofu Plan',
              '',
              '<details><summary>Show Plan</summary>',
              '',
              '```',
              clippedPlan,
              '```',
              '',
              '</details>',
            ].join('\n');

            const comments = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const existing = comments.data.find((comment) =>
              comment.body && comment.body.includes(marker),
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
